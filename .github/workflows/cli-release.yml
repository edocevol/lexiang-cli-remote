name: CLI Release

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 0.1.0)'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x86_64
            artifact: lx
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
            artifact: lx

          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            artifact: lx
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
            artifact: lx
            use_cross: true

          # Linux musl (static)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: linux-x86_64-musl
            artifact: lx
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            name: linux-arm64-musl
            artifact: lx
            use_cross: true

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            artifact: lx.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-v1
          key: ${{ matrix.target }}

      - name: Fetch dependencies
        run: cargo fetch --target ${{ matrix.target }}

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/cli-v* ]]; then
            version="${GITHUB_REF#refs/tags/cli-v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            echo "Release version is required for workflow_dispatch" >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build (cross)
        if: matrix.use_cross
        env:
          LX_VERSION: ${{ steps.release_version.outputs.value }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        env:
          LX_VERSION: ${{ steps.release_version.outputs.value }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/lx-${{ matrix.name }}
          chmod +x dist/lx-${{ matrix.name }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "dist/lx-${{ matrix.name }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lx-${{ matrix.name }}
          path: dist/lx-${{ matrix.name }}*
          if-no-files-found: error

  # macOS Universal Binary
  universal-macos:
    name: Build macOS Universal
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lx-macos-*
          path: artifacts
          merge-multiple: false

      - name: Create Universal Binary
        run: |
          mkdir -p dist
          lipo -create \
            artifacts/lx-macos-x86_64/lx-macos-x86_64 \
            artifacts/lx-macos-arm64/lx-macos-arm64 \
            -output dist/lx-macos-universal
          chmod +x dist/lx-macos-universal
          codesign --force --sign - dist/lx-macos-universal

      - name: Upload Universal Binary
        uses: actions/upload-artifact@v4
        with:
          name: lx-macos-universal
          path: dist/lx-macos-universal
          if-no-files-found: error

  # Create GitHub Release
  release:
    name: Create Release
    needs: [build, universal-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cli-v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          
          # Linux
          cp artifacts/lx-linux-x86_64/lx-linux-x86_64 release/
          cp artifacts/lx-linux-arm64/lx-linux-arm64 release/
          
          # Linux musl (static)
          cp artifacts/lx-linux-x86_64-musl/lx-linux-x86_64-musl release/
          cp artifacts/lx-linux-arm64-musl/lx-linux-arm64-musl release/
          
          # macOS
          cp artifacts/lx-macos-x86_64/lx-macos-x86_64 release/
          cp artifacts/lx-macos-arm64/lx-macos-arm64 release/
          cp artifacts/lx-macos-universal/lx-macos-universal release/
          
          # Windows
          cp artifacts/lx-windows-x86_64/lx-windows-x86_64.exe release/
          
          # Create checksums
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/cli-v* ]]; then
            version="${GITHUB_REF#refs/tags/cli-v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            echo "Release version is required" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: lx CLI v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: release/*
          generate_release_notes: true
